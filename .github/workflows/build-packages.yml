# 手动打包 CI — 不创建 Release，产物作为 workflow artifact 下载
# 与 release.yml 相同的构建配置，但无需 tag，版本号从 CMakeLists.txt 提取

name: Build packages (manual)

on:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-x64,      os: ubuntu-24.04        }
          - { name: linux-aarch64,  os: ubuntu-24.04-arm    }
          - { name: macos-arm64,    os: macos-latest       }
          - { name: win-x64,        os: windows-latest     }

    steps:
      - uses: actions/checkout@v4

      # ======== 依赖 ========

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasio-dev libspdlog-dev libusb-1.0-0-dev libcxxopts-dev libevdev-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install asio spdlog libusb cxxopts

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          vcpkg install asio spdlog libusb cxxopts --triplet x64-windows

      # ======== CMake 配置 ========

      - name: Configure CMake (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSBIPDCPP_USE_PKGCONF_ASIO=ON \
            -DUSBIPDCPP_BUILD_SHARED_LIBS=ON \
            -DUSBIPDCPP_BUILD_VIRTUAL_DEVICE=ON \
            -DUSBIPDCPP_BUILD_LIBUSB_COMPONENTS=ON \
            -DUSBIPDCPP_BUILD_EXAMPLES=ON \
            -DUSBIPDCPP_INSTALL_EXAMPLES=ON \
            -DUSBIPDCPP_BUILD_TESTS=OFF \
            -S ${{ github.workspace }}

      - name: Configure CMake (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$(brew --prefix)" \
            -DUSBIPDCPP_USE_PKGCONF_ASIO=ON \
            -DUSBIPDCPP_BUILD_SHARED_LIBS=ON \
            -DUSBIPDCPP_BUILD_VIRTUAL_DEVICE=ON \
            -DUSBIPDCPP_BUILD_LIBUSB_COMPONENTS=ON \
            -DUSBIPDCPP_BUILD_EXAMPLES=ON \
            -DUSBIPDCPP_INSTALL_EXAMPLES=ON \
            -DUSBIPDCPP_BUILD_TESTS=OFF \
            -S ${{ github.workspace }}

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DUSBIPDCPP_BUILD_SHARED_LIBS=ON `
            -DUSBIPDCPP_BUILD_VIRTUAL_DEVICE=ON `
            -DUSBIPDCPP_BUILD_LIBUSB_COMPONENTS=ON `
            -DUSBIPDCPP_BUILD_EXAMPLES=ON `
            -DUSBIPDCPP_INSTALL_EXAMPLES=ON `
            -DUSBIPDCPP_BUILD_TESTS=OFF `
            -S ${{ github.workspace }}

      # ======== 编译 + 安装到临时目录 ========

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Install to staging
        run: cmake --install build --config Release --prefix staging

      # ======== 打包（版本号从 CMakeLists.txt 提取 + commit hash） ========

      - name: Package
        shell: bash
        run: |
          VERSION=$(grep -oP 'project\(\w+ VERSION \K[0-9.]+' CMakeLists.txt)
          SHORT_SHA=$(git rev-parse --short HEAD)
          DIRNAME="usbipdcpp-${VERSION}-${SHORT_SHA}-${{ matrix.name }}"
          mv staging "${DIRNAME}"
          tar czf "${DIRNAME}.tar.gz" "${DIRNAME}"
          echo "archive=${DIRNAME}.tar.gz" >> $GITHUB_ENV

      # ======== 上传为 workflow artifact ========

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ env.archive }}