# 多平台 CMake 编译 + 测试
# 触发：push 到 main/develop，PR 到 main/develop
# 矩阵：Linux(gcc) 8 种 × Windows(msvc) 4 种选项排列

name: CMake on multiple platforms

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        include:
          # ======== Linux (gcc) : VIRTUAL_DEVICE × LIBUSB × SHARED 全排列 (8) ========
          - { os: ubuntu-latest, cpp: g++,    vdev: ON,  libusb: ON,  shared: ON  }
          - { os: ubuntu-latest, cpp: g++,    vdev: ON,  libusb: ON,  shared: OFF }
          - { os: ubuntu-latest, cpp: g++,    vdev: ON,  libusb: OFF, shared: ON  }
          - { os: ubuntu-latest, cpp: g++,    vdev: ON,  libusb: OFF, shared: OFF }
          - { os: ubuntu-latest, cpp: g++,    vdev: OFF, libusb: ON,  shared: ON  }
          - { os: ubuntu-latest, cpp: g++,    vdev: OFF, libusb: ON,  shared: OFF }
          - { os: ubuntu-latest, cpp: g++,    vdev: OFF, libusb: OFF, shared: ON  }
          - { os: ubuntu-latest, cpp: g++,    vdev: OFF, libusb: OFF, shared: OFF }
          # ======== Windows (msvc) : libusb 不开（runner 无 libusb）(4) ========
          - { os: windows-latest, cpp: cl,    vdev: ON,  libusb: OFF, shared: ON  }
          - { os: windows-latest, cpp: cl,    vdev: ON,  libusb: OFF, shared: OFF }
          - { os: windows-latest, cpp: cl,    vdev: OFF, libusb: OFF, shared: ON  }
          - { os: windows-latest, cpp: cl,    vdev: OFF, libusb: OFF, shared: OFF }

    steps:
      - uses: actions/checkout@v4

      # ======== 依赖（vcpkg + GitHub Actions 缓存，二次跑不用重编译） ========

      - name: Enable vcpkg binary cache (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "VCPKG_BINARY_SOURCES=clear;x-gha,readwrite" >> $GITHUB_ENV

      - name: Enable vcpkg binary cache (Windows)
        if: runner.os == 'Windows'
        run: |
          "VCPKG_BINARY_SOURCES=clear;x-gha,readwrite" | Out-File -Append -FilePath $env:GITHUB_ENV

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          vcpkg install asio spdlog gtest cxxopts --triplet x64-linux
          if [ "${{ matrix.libusb }}" = "ON" ]; then
            vcpkg install libusb --triplet x64-linux
          fi

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          vcpkg install asio spdlog gtest cxxopts --triplet x64-windows

      # ======== CMake 配置 ========

      - name: Configure CMake (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -B build \
            -DCMAKE_CXX_COMPILER=${{ matrix.cpp }} \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DUSBIPDCPP_BUILD_EXAMPLES=ON \
            -DUSBIPDCPP_BUILD_TESTS=ON \
            -DUSBIPDCPP_BUILD_VIRTUAL_DEVICE=${{ matrix.vdev }} \
            -DUSBIPDCPP_BUILD_LIBUSB_COMPONENTS=${{ matrix.libusb }} \
            -DUSBIPDCPP_BUILD_SHARED_LIBS=${{ matrix.shared }} \
            -S ${{ github.workspace }}

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -B build `
            -DCMAKE_CXX_COMPILER=${{ matrix.cpp }} `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DUSBIPDCPP_BUILD_EXAMPLES=ON `
            -DUSBIPDCPP_BUILD_TESTS=ON `
            -DUSBIPDCPP_BUILD_VIRTUAL_DEVICE=${{ matrix.vdev }} `
            -DUSBIPDCPP_BUILD_LIBUSB_COMPONENTS=${{ matrix.libusb }} `
            -DUSBIPDCPP_BUILD_SHARED_LIBS=${{ matrix.shared }} `
            -S ${{ github.workspace }}

      # ======== 编译 + 测试 ========

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        working-directory: build
        run: ctest --build-config Release
